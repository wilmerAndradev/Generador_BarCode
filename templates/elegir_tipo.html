<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elegir Tipo de Etiqueta - Silk Perfumes</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-16x16.png">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
  <!-- NAVBAR CON LOGO CENTRADO -->
  <nav class="navbar">
    <div class="container d-flex justify-content-center">
      <a class="navbar-brand" href="#">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
      </a>
    </div>
  </nav>

  <!-- FORMULARIO DE SELECCIÓN -->
  <div class="form-container">
    <!-- INDICADOR DE PASOS -->
    <div class="step-indicator">
      <span class="step completed">1</span>
      <span class="step active">1.5</span>
      <span class="step">2</span>
    </div>

    <h2 class="text-center mb-2"><strong>Elige el tipo de etiqueta</strong></h2>
    <p class="text-center text-muted mb-5">Selecciona si deseas etiquetas con código de barras o personalizadas</p>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger" role="alert">
          {% for message in messages %}
            <p class="mb-0">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="row">
        <!-- OPCIÓN 1: CÓDIGO DE BARRAS -->
        <div class="col-md-6 mb-4">
          <label class="etiqueta-option">
            <input type="radio" name="tipo_etiqueta" value="codigo_barras" required>
            <div class="etiqueta-option-content">
              <div class="etiqueta-option-icon">
                <i class="fas fa-barcode"></i>
              </div>
              <div class="etiqueta-option-text">
                <h5>Código de Barras</h5>
                <p>Etiquetas estándar con código de barras automático. Perfecto para inventario.</p>
                <ul class="small">
                  <li><i class="fas fa-check text-success"></i> SKU único</li>
                  <li><i class="fas fa-check text-success"></i> Código de barras automático</li>
                  <li><i class="fas fa-check text-success"></i> Escaneable</li>
                </ul>
              </div>
            </div>
          </label>
        </div>

        <!-- OPCIÓN 2: PERSONALIZADO -->
        <div class="col-md-6 mb-4">
          <label class="etiqueta-option">
            <input type="radio" name="tipo_etiqueta" value="personalizado" required>
            <div class="etiqueta-option-content">
              <div class="etiqueta-option-icon">
                <i class="fas fa-edit"></i>
              </div>
              <div class="etiqueta-option-text">
                <h5>Etiqueta Personalizada</h5>
                <p>Diseña tus etiquetas con datos personalizados. Máxima flexibilidad.</p>
                <ul class="small">
                  <li><i class="fas fa-check text-success"></i> Nombre del producto</li>
                  <li><i class="fas fa-check text-success"></i> Precio/Valor</li>
                  <li><i class="fas fa-check text-success"></i> SKU y más</li>
                </ul>
              </div>
            </div>
          </label>
        </div>
      </div>

      <div class="d-flex justify-content-between mt-5">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">← Volver</a>
        <button type="submit" class="btn btn-primary">Continuar →</button>
      </div>
    </form>
  </div>

  <!-- Estilos adicionales para las opciones -->
  <style>
    .etiqueta-option {
      display: block;
      cursor: pointer;
    }

    .etiqueta-option input {
      display: none;
    }

    .etiqueta-option-content {
      border: 2px solid #e9ecef;
      border-radius: 12px;
      padding: 25px 20px;
      transition: all 0.3s ease;
      background-color: #fdfdfd;
      height: 100%;
    }

    .etiqueta-option input:checked + .etiqueta-option-content {
      border-color: var(--color-principal);
      background-color: #faf8f3;
      box-shadow: 0 0 0 3px rgba(177, 131, 64, 0.1);
    }

    .etiqueta-option:hover .etiqueta-option-content {
      border-color: var(--color-principal);
      transform: translateY(-2px);
    }

    .etiqueta-option-icon {
      font-size: 2.5em;
      color: var(--color-principal);
      margin-bottom: 15px;
    }

    .etiqueta-option-text h5 {
      color: var(--color-principal);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .etiqueta-option-text p {
      color: #6c757d;
      font-size: 0.9em;
      margin-bottom: 12px;
    }

    .etiqueta-option-text ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .etiqueta-option-text li {
      color: #6c757d;
      margin: 4px 0;
    }

    .etiqueta-option-text .fa-check {
      margin-right: 6px;
    }
  </style>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
